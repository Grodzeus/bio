<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="icon" id="favicon" href="favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #ffffff;
      --bg2:    #f5f5f5;
      --border: #cccccc;
      --text:   #000000;
      --sub:    #14213d;
      --muted:  #5a6480;
      --accent: #fca311;
      --ff-head: 'Syne', sans-serif;
      --ff-mono: 'IBM Plex Mono', monospace;
      --ff-body: 'Lora', serif;
    }

    [data-theme="dark"] {
      --bg:     #000000;
      --bg2:    #14213d;
      --border: #243352;
      --text:   #e5e5e5;
      --sub:    #c8cdd8;
      --muted:  #8a94a8;
      --accent: #fca311;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--ff-body); font-size: 1rem; line-height: 1.78;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: background .3s, color .3s;
    }

    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      opacity: .5;
    }

    .container {
      position: relative; z-index: 1;
      text-align: center;
      padding: 40px 28px;
      max-width: 520px;
    }

    .code {
      font-family: var(--ff-mono);
      font-size: clamp(5rem, 20vw, 8rem);
      font-weight: 500;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -.04em;
    }

    h1 {
      font-family: var(--ff-head);
      font-size: clamp(1.25rem, 4vw, 1.6rem);
      font-weight: 700;
      color: var(--text);
      margin: 16px 0 8px;
    }

    p {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 32px;
    }

    #redirect-msg {
      font-family: var(--ff-mono);
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .btn {
      display: inline-block;
      font-family: var(--ff-head);
      font-weight: 600;
      font-size: .9rem;
      letter-spacing: .04em;
      padding: 12px 28px;
      border-radius: 6px;
      background: var(--accent);
      color: #000;
      text-decoration: none;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }

    .divider {
      width: 48px; height: 3px;
      background: var(--accent);
      margin: 20px auto 0;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <div class="divider"></div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist.</p>
    <div id="redirect-msg"></div>
    <a href="/" class="btn" id="homeBtn">Go home</a>
  </div>

  <script>
    // Apply theme from localStorage (matches main site logic)
    (function () {
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = stored || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('favicon').href = theme === 'dark' ? 'favicon-dark.png' : 'favicon.png';
    })();

    // Smart redirect: map path segments to anchors
    const ANCHOR_MAP = {
      'about':      '#about',
      'skills':     '#skills',
      'education':  '#edu',
      'edu':        '#edu',
      'experience': '#exp',
      'exp':        '#exp',
      'projects':   '#projects',
      'contact':    '#contact',
    };

    const path = window.location.pathname.replace(/^\/+|\/+$/g, '').toLowerCase();
    const anchor = path ? ANCHOR_MAP[path] : null;
    const destination = anchor ? ('/' + anchor) : '/';

    if (anchor) {
      let countdown = 3;
      const msg = document.getElementById('redirect-msg');
      const btn = document.getElementById('homeBtn');
      btn.href = destination;

      function tick() {
        msg.textContent = 'Redirecting in ' + countdown + 's…';
        if (countdown === 0) {
          window.location.replace(destination);
        } else {
          countdown--;
          setTimeout(tick, 1000);
        }
      }
      tick();
    }
  </script>
</body>
</html>
